services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./server/static:/usr/share/nginx/html:ro
    depends_on:
      - api

  api:
    build: .
    environment:
      - GLIMMER_SECRET_KEY=${GLIMMER_SECRET_KEY}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - DATABASE_URL=postgresql+asyncpg://glimmer:${DB_PASSWORD}@db:5432/glimmer
      - DOCKER_HOST=unix:///var/run/docker.sock
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-http://localhost:8000/api/auth/callback}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace_data:/workspace
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: glimmer
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: glimmer
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  workspace_data:
