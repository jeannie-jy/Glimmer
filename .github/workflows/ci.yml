# Lite Agent Harness CI
# Runs unit tests (zero network, Mock LLM) and integration tests on every push.

name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

env:
  HARNESS_KEY_PASSWORD: ci-test-password

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python --version
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short

  demo-test:
    name: Demo Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run demo tests
        run: |
          python tests/demo/demo_guardrail.py
          python tests/demo/demo_sandbox.py
          python tests/demo/demo_feedback_loop.py
